    <script>
    function filterSelection(c) {
        var x = document.getElementsByClassName("art-item");
        if (c == "all") c = "";
        for (var i = 0; i < x.length; i++) {
            x[i].style.display = "none";
            if (x[i].className.indexOf(c) > -1) { 
                x[i].style.display = "block"; 
            }
        }
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('full-image');
    const videoPlayer = document.getElementById('video-player');
    const captionText = document.getElementById('caption');
    const artItems = document.querySelectorAll('.art-item');
    const closeBtn = document.querySelector('.close');

    artItems.forEach(item => {
        item.addEventListener('click', () => {
            const img = item.querySelector('img');
            lightbox.style.display = 'flex';
            captionText.innerText = img.alt;
            document.body.style.overflow = 'hidden';

            if (item.classList.contains('video-item')) {
                // Jika Video
                const videoId = item.getAttribute('data-video-id');
                videoPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                videoPlayer.style.display = 'block';
                lightboxImg.style.display = 'none';
            } else {
                // Jika Gambar Biasa
                lightboxImg.src = img.src;
                lightboxImg.style.display = 'block';
                videoPlayer.style.display = 'none';
                videoPlayer.src = ""; // Stop video jika ada
            }
        });
    });

    const closeLightbox = () => {
        lightbox.style.display = 'none';
        document.body.style.overflow = 'auto';
        videoPlayer.src = ""; // Penting: Agar suara video berhenti saat ditutup
    };

    closeBtn.addEventListener('click', closeLightbox);
    
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target.id === "caption") {
            closeLightbox();
        }
    });
</script>
