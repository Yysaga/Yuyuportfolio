    <script>
    // --- 1. FUNGSI FILTER GALERI & TEKS DESKRIPSI ---
    function filterSelection(c) {
        const items = document.getElementsByClassName("art-item");
        const descContainer = document.getElementById("filter-description");

        if (c === "all") c = "";
        
        // Logika Teks Penjelasan AI
        if (c === "aiart") {
            descContainer.innerHTML = "<p>Evolving with AI to create cool, consistent characters for illustrations and comics. Expertly using Midjourney, Nano Banana, and ChatGPT to bring your visual stories to life.</p>";
            descContainer.style.display = "block";
        } else {
            descContainer.innerHTML = "";
            descContainer.style.display = "none";
        }

        for (let i = 0; i < items.length; i++) {
            // Sembunyikan semua item
            items[i].style.display = "none";
            
            // Tampilkan jika class-nya mengandung kategori yang dipilih
            if (items[i].className.indexOf(c) > -1) { 
                items[i].style.display = "block"; 
            }
        }

        // Mengatur status 'active' pada tombol filter
        const btnContainer = document.querySelector(".filter-buttons");
        if (btnContainer) {
            const btns = btnContainer.getElementsByTagName("button");
            for (let i = 0; i < btns.length; i++) {
                btns[i].addEventListener("click", function() {
                    const current = btnContainer.getElementsByClassName("active");
                    if (current.length > 0) { 
                        current[0].className = current[0].className.replace(" active", ""); 
                    }
                    this.className += " active";
                });
            }
        }
    }

    // Jalankan filter 'all' saat pertama kali buka
    filterSelection("all");


    // --- 2. LOGIKA LIGHTBOX (GAMBAR & VIDEO) ---
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('full-image');
    const videoPlayer = document.getElementById('video-player');
    const captionText = document.getElementById('caption');
    const artItems = document.querySelectorAll('.art-item');
    const closeBtn = document.querySelector('.close');

    artItems.forEach(item => {
        item.addEventListener('click', () => {
            const img = item.querySelector('img');
            
            // Munculkan background hitam (flex)
            lightbox.style.display = 'flex';
            captionText.innerText = img.alt;
            document.body.style.overflow = 'hidden'; // Kunci scroll layar utama

            // CEK: Apakah video?
            if (item.classList.contains('video-item')) {
                const videoId = item.getAttribute('data-video-id');
                
                // Gunakan embed YouTube
                videoPlayer.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0`;
                videoPlayer.style.display = 'block';
                lightboxImg.style.display = 'none';
            } else {
                // Jika gambar biasa
                lightboxImg.src = img.src;
                lightboxImg.style.display = 'block';
                videoPlayer.style.display = 'none';
                videoPlayer.src = ""; 
            }
        });
    });


    // --- 3. FUNGSI TUTUP ---
    function closeLightbox() {
        lightbox.style.display = 'none';
        document.body.style.overflow = 'auto'; // Aktifkan kembali scroll
        
        // Reset Video (Matikan suara)
        videoPlayer.src = ""; 
        videoPlayer.style.display = 'none';
        lightboxImg.style.display = 'none';
    }

    // Klik Tombol X untuk Tutup
    if (closeBtn) {
        closeBtn.onclick = function(e) {
            e.stopPropagation();
            closeLightbox();
        };
    }

    // Klik Area Hitam (Background) untuk Tutup
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
            closeLightbox();
        }
    });
</script>
