<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Illustrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">MY PORTFOLIO</div>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <header>
        <h1>Visual Storyteller</h1>
        <p>Creating immersive worlds through digital strokes.</p>
    </header>

    <div class="filter-buttons">
        <button onclick="filterSelection('all')">All</button>
        <button onclick="filterSelection('illustration')">Illustration</button>
        <button onclick="filterSelection('comics')">Comics</button>
        <button onclick="filterSelection('kidsbook')">Children's Books</button>
    </div>

    <main class="gallery">
        <div class="art-item kidsbook">
            <img src="images/buku1.jpg" alt="Buku Anak 1">
        </div>
        <div class="art-item kidsbook">
            <img src="images/buku2.jpg" alt="Buku Anak 2">
        </div>
        
        <div class="art-item illustration">
            <img src="images/ilustrasi1.jpg" alt="Ilustrasi 1">
        </div>
        <div class="art-item illustration">
            <img src="images/ilustrasi2.jpg" alt="Ilustrasi 2">
        </div>
        
        <div class="art-item comics">
            <img src="images/komik1.jpg" alt="Komik 1">
        </div>
        <div class="art-item comics">
            <img src="images/komik2.jpg" alt="Komik 2">
        </div>
    </main>

    <script>
        function filterSelection(c) {
            var x, i;
            x = document.getElementsByClassName("art-item");
            if (c == "all") c = "";
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
                if (x[i].className.indexOf(c) > -1) {
                    x[i].style.display = "block";
                }
            }
        }
    </script>

</body>
</html>
