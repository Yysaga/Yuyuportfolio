<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Illustrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">MY PORTFOLIO</div>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <header>
        <h1>Visual Storyteller</h1>
        <p>Creating immersive worlds through digital strokes.</p>
    </header>

    <div class="filter-buttons">
        <button onclick="filterSelection('all')">All</button>
        <button onclick="filterSelection('illustration')">Illustration</button>
        <button onclick="filterSelection('comics')">Comics</button>
        <button onclick="filterSelection('kidsbook')">Children's Books</button>
    </div>

    <main class="gallery">
        <div class="art-item kidsbook">
            <img src="images/buku1.jpg" alt="Buku Anak 1">
        </div>
        <div class="art-item kidsbook">
            <img src="images/buku2.jpg" alt="Buku Anak 2">
        </div>
        
        <div class="art-item illustration">
            <img src="images/ilustrasi1.jpg" alt="Ilustrasi 1">
        </div>
        <div class="art-item illustration">
            <img src="images/ilustrasi2.jpg" alt="Ilustrasi 2">
        </div>
        
        <div class="art-item comics">
            <img src="images/komik1.jpg" alt="Komik 1">
        </div>
        <div class="art-item comics">
            <img src="images/komik2.jpg" alt="Komik 2">
        </div>
    </main>

    <script>
    // FUNGSI FILTER
    function filterSelection(c) {
        var x = document.getElementsByClassName("art-item");
        if (c == "all") c = "";
        for (var i = 0; i < x.length; i++) {
            x[i].style.display = "none";
            if (x[i].className.indexOf(c) > -1) {
                x[i].style.display = "block";
            }
        }
    }

    // FUNGSI LIGHTBOX
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('full-image');
    const images = document.querySelectorAll('.art-item img');
    const closeBtn = document.querySelector('.close');

    // Saat gambar diklik
    images.forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'block';
            lightboxImg.src = img.src;
        });
    });

    // Saat tombol X diklik
    closeBtn.addEventListener('click', () => {
        lightbox.style.display = 'none';
    });

    // Saat background hitam diklik
    lightbox.addEventListener('click', (e) => {
        if (e.target !== lightboxImg) {
            lightbox.style.display = 'none';
        }
    });
</script>

    <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img class="lightbox-content" id="full-image">
    </div>

</body>
</html>
