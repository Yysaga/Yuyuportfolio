    <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
       <img class="lightbox-content" id="full-image" alt="Full Image">
       <p id="caption"></p>
    </div>


    <script>
    // 1. Fungsi Filter (Untuk kategori)
    function filterSelection(c) {
        var x = document.getElementsByClassName("art-item");
        if (c == "all") c = "";
        for (var i = 0; i < x.length; i++) {
            x[i].style.display = "none";
            if (x[i].className.indexOf(c) > -1) { 
                x[i].style.display = "block"; 
            }
        }
    }

    // 2. Logika Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('full-image');
    const captionText = document.getElementById('caption');
    const images = document.querySelectorAll('.art-item img');
    const closeBtn = document.querySelector('.close');

    // Sembunyikan lightbox saat pertama kali load
    lightbox.style.display = 'none';

    // Event buka lightbox
    images.forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex'; // Munculkan
            lightboxImg.src = img.src;       // Ambil gambar
            captionText.innerText = img.alt; // Ambil teks dari alt
            document.body.style.overflow = 'hidden'; // Kunci scroll
        });
    });

    // Fungsi tutup
    const closeLightbox = () => {
        lightbox.style.display = 'none'; // Sembunyikan
        document.body.style.overflow = 'auto'; // Aktifkan scroll
    };

    closeBtn.addEventListener('click', closeLightbox);

    // Klik di luar gambar untuk tutup
    lightbox.addEventListener('click', (e) => {
        if (e.target !== lightboxImg && e.target !== captionText) {
            closeLightbox();
        }
    });
</script>
