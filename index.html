<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Visual Storyteller</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/logo.png">
</head>
<body>

    <nav>
        <div class="logo">MY PORTFOLIO</div>
        <a href="mailto:email@kamu.com" class="nav-link">Contact</a>
    </nav>

    <header class="main-title">
        <h1>Visual Storyteller</h1>
    </header>

    <div class="filter-buttons">
        <button onclick="filterSelection('all')">All</button>
        <button onclick="filterSelection('illustration')">Illustrations</button>
        <button onclick="filterSelection('comics')">Comic books</button>
        <button onclick="filterSelection('characters')">Character design</button>
        <button onclick="filterSelection('logo')">Logo and branding</button>
        <button onclick="filterSelection('portrait')">Portrait art</button>
        <button onclick="filterSelection('kidsbook')">Children book</button>
    </div>

    <main class="gallery">
        <div class="art-item kidsbook"><img src="buku1.PNG" alt="Buku Anak 1"></div>
        <div class="art-item kidsbook"><img src="images/buku2.jpg" alt="Buku Anak 2"></div>
        <div class="art-item illustration"><img src="Illu1.PNG" alt="Millitary deer on the car. illustration for clients"></div>
        <div class="art-item illustration"><img src="Illu2.PNG" alt="Millitary illustration for client"></div>
        <div class="art-item comics"><img src="images/komik1.jpg" alt="Komik 1"></div>
        <div class="art-item comics"><img src="images/komik2.jpg" alt="Komik 2"></div>
    </main>

    <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
       <img class="lightbox-content" id="full-image" alt="Full Image">
       <p id="caption"></p>
    </div>


    <script>
    // --- 1. Fungsi Filter ---
    function filterSelection(c) {
        var x = document.getElementsByClassName("art-item");
        if (c == "all") c = "";
        for (var i = 0; i < x.length; i++) {
            x[i].style.display = "none";
            if (x[i].className.indexOf(c) > -1) { 
                x[i].style.display = "block"; 
            }
        }
    }

    // --- 2. Fungsi Lightbox (Dengan Caption) ---
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('full-image');
    const captionText = document.getElementById('caption'); // Ambil elemen caption
    const images = document.querySelectorAll('.art-item img');
    const closeBtn = document.querySelector('.close');

    images.forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex'; 
            lightboxImg.src = img.src;
            captionText.innerText = img.alt; // Ambil teks dari atribut ALT
            document.body.style.overflow = 'hidden';
        });
    });

    const closeLightbox = () => {
        lightbox.style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    closeBtn.addEventListener('click', closeLightbox);
    
    lightbox.addEventListener('click', (e) => {
        // Jangan tutup kalau yang diklik adalah gambar atau caption
        if (e.target !== lightboxImg && e.target !== captionText) {
            closeLightbox();
        }
    });
</script>




    <footer class="footer-final">
        <div class="footer-container">
          <p class="about-desc">Visual storyteller, exploring narratives through illustrations. Based in Indonesia.</p>
        
          <div class="social-links">
            <a href="about.html">About me</a> / <a href="#">Instagram</a> / <a href="#">Behance</a> / <a href="mailto:email@kamu.com">Email</a>
          </div>
            
          <p class="copyright">&copy; Yuyu 2026. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
